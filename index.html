<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Share</title>
  <meta name="description" content="Share image with dynamic text overlay.">
  <meta name="theme-color" content="#01696f">

  <meta property="og:title" content="Image Share">
  <meta property="og:description" content="Share image with dynamic text overlay.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://learnsher.github.io/sharelongimage/">
  <meta property="og:image" content="https://learnsher.github.io/sharelongimage/og-image.jpg">
  <meta property="og:image:alt" content="Image Share preview">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Image Share">
  <meta name="twitter:description" content="Share image with dynamic text overlay.">
  <meta name="twitter:image" content="https://learnsher.github.io/sharelongimage/og-image.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:#f7f6f2;
      --color-surface:#f9f8f5;
      --color-surface-2:#ffffff;
      --color-border:#d4d1ca;
      --color-divider:#dcd9d5;
      --color-text:#28251d;
      --color-text-muted:#7a7974;
      --color-text-faint:#bab9b4;
      --color-primary:#01696f;
      --color-primary-hover:#0c4e54;
      --color-error:#a12c7b;
      --color-error-highlight:#fdf0f8;
      --color-success:#437a22;
      --color-success-highlight:#f2f8ed;
      --color-warning:#964219;
      --color-warning-highlight:#fdf4ef;
      --radius-sm:0.375rem;
      --radius-md:0.5rem;
      --radius-lg:0.75rem;
      --radius-xl:1rem;
      --shadow-lg:0 12px 40px oklch(0.2 0.01 80 / 0.13);
      --transition:180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body:'Inter', 'Helvetica Neue', sans-serif;
    }

    [data-theme="dark"] {
      --color-bg:#171614;
      --color-surface:#1c1b19;
      --color-surface-2:#201f1d;
      --color-border:#393836;
      --color-divider:#262523;
      --color-text:#cdccca;
      --color-text-muted:#797876;
      --color-text-faint:#5a5957;
      --color-primary:#4f98a3;
      --color-primary-hover:#227f8b;
      --color-error:#d163a7;
      --color-error-highlight:#2a1a24;
      --color-success:#6daa45;
      --color-success-highlight:#1e2c18;
      --color-warning:#bb653b;
      --color-warning-highlight:#2a1e14;
      --shadow-lg:0 12px 40px oklch(0 0 0 / 0.45);
    }

    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      transition: background var(--transition), color var(--transition);
    }

    .card {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .logo {
      display:flex;
      align-items:center;
      gap:0.625rem;
    }

    .logo-icon {
      width:32px;
      height:32px;
      flex-shrink:0;
    }

    .logo-text {
      font-size:1rem;
      font-weight:600;
      color:var(--color-text);
      letter-spacing:-0.02em;
    }

    .theme-toggle {
      width:36px;
      height:36px;
      border-radius:var(--radius-md);
      border:1px solid var(--color-border);
      background:var(--color-surface);
      color:var(--color-text-muted);
      cursor:pointer;
      display:grid;
      place-items:center;
      transition:all var(--transition);
      flex-shrink:0;
    }

    .theme-toggle:hover {
      background:var(--color-bg);
      color:var(--color-text);
    }

    .divider {
      height:1px;
      background:var(--color-divider);
    }

    .fields {
      display:flex;
      flex-direction:column;
      gap:0.875rem;
    }

    .field {
      display:flex;
      flex-direction:column;
      gap:0.375rem;
    }

    label {
      font-size:0.8125rem;
      font-weight:500;
      color:var(--color-text-muted);
      letter-spacing:0.01em;
    }

    .input-wrap {
      position:relative;
    }

    .input-badge {
      position:absolute;
      right:0.625rem;
      top:50%;
      transform:translateY(-50%);
      font-size:0.6875rem;
      font-weight:600;
      letter-spacing:0.04em;
      padding:0.2em 0.5em;
      border-radius:var(--radius-sm);
      background:oklch(from var(--color-primary) l c h / 0.12);
      color:var(--color-primary);
      pointer-events:none;
      opacity:0;
      transition:opacity var(--transition);
    }

    .input-badge.show {
      opacity:1;
    }

    input[type="text"],
    input[type="url"],
    textarea {
      width:100%;
      padding:0.6875rem 0.875rem;
      background:var(--color-surface);
      border:1px solid var(--color-border);
      border-radius:var(--radius-md);
      font-size:0.9375rem;
      font-family:var(--font-body);
      color:var(--color-text);
      outline:none;
      transition:border-color var(--transition), box-shadow var(--transition);
      resize:vertical;
    }

    input[type="url"] {
      padding-right:3.5rem;
    }

    input:focus,
    textarea:focus {
      border-color:var(--color-primary);
      box-shadow:0 0 0 3px oklch(from var(--color-primary) l c h / 0.15);
    }

    input::placeholder,
    textarea::placeholder {
      color:var(--color-text-faint);
    }

    textarea {
      min-height:68px;
      line-height:1.5;
    }

    .preview-wrap {
      border-radius:var(--radius-lg);
      overflow:hidden;
      border:1px solid var(--color-divider);
      background:var(--color-bg);
      min-height:120px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    canvas {
      display:block;
      width:100%;
      height:auto;
      border-radius:calc(var(--radius-lg) - 1px);
    }

    .preview-empty {
      color:var(--color-text-faint);
      font-size:0.8125rem;
      text-align:center;
      padding:2rem;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:0.625rem;
    }

    .btn-row {
      display:flex;
      gap:0.75rem;
    }

    .btn-row.mobile-single .btn-share {
      flex:1 1 100%;
      width:100%;
    }

    .btn-share,
    .btn-wa {
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0.45rem;
      padding:0.8125rem 1rem;
      border:none;
      border-radius:var(--radius-md);
      font-size:0.9375rem;
      font-weight:600;
      font-family:var(--font-body);
      cursor:pointer;
      transition:background var(--transition), box-shadow var(--transition), transform var(--transition);
    }

    .btn-share:active,
    .btn-wa:active {
      transform:scale(0.98);
    }

    .btn-share:disabled,
    .btn-wa:disabled {
      opacity:0.42;
      cursor:not-allowed;
      transform:none;
    }

    .btn-share {
      background:var(--color-primary);
      color:#fff;
      box-shadow:0 1px 3px oklch(from var(--color-primary) 0.3 c h / 0.35);
    }

    .btn-share:hover:not(:disabled) {
      background:var(--color-primary-hover);
      box-shadow:0 3px 10px oklch(from var(--color-primary) 0.3 c h / 0.4);
    }

    .btn-wa {
      background:#25D366;
      color:#fff;
      box-shadow:0 1px 3px rgba(37,211,102,0.35);
    }

    .btn-wa:hover:not(:disabled) {
      background:#20ba5a;
      box-shadow:0 3px 10px rgba(37,211,102,0.4);
    }

    .status {
      font-size:0.8125rem;
      border-radius:var(--radius-md);
      padding:0.625rem 0.875rem;
      display:none;
      align-items:flex-start;
      gap:0.5rem;
      line-height:1.5;
    }

    .status.error {
      display:flex;
      background:var(--color-error-highlight);
      color:var(--color-error);
      border:1px solid oklch(from var(--color-error) l c h / 0.2);
    }

    .status.success {
      display:flex;
      background:var(--color-success-highlight);
      color:var(--color-success);
      border:1px solid oklch(from var(--color-success) l c h / 0.2);
    }

    .status.warning {
      display:flex;
      background:var(--color-warning-highlight);
      color:var(--color-warning);
      border:1px solid oklch(from var(--color-warning) l c h / 0.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none" aria-label="ImageShare logo">
          <rect width="32" height="32" rx="8" fill="var(--color-primary)" opacity="0.12"/>
          <rect x="5" y="8" width="22" height="16" rx="3" stroke="var(--color-primary)" stroke-width="1.5" fill="none"/>
          <circle cx="10.5" cy="13.5" r="2" fill="var(--color-primary)"/>
          <path d="M5 20l5.5-5 4 4 3.5-3.5L27 20" stroke="var(--color-primary)" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
          <path d="M19 21h8M23 17v8" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">ImageShare</span>
      </div>

      <button class="theme-toggle" data-theme-toggle aria-label="Switch to dark mode">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

    <div class="divider"></div>

    <div class="fields">
      <div class="field">
        <label for="imgUrl">Image URL</label>
        <div class="input-wrap">
          <input
            id="imgUrl"
            type="url"
            value="https://raw.githubusercontent.com/Learnsher/testing/main/demoshare.jpg"
            autocomplete="off"
            spellcheck="false"
          >
          <span class="input-badge" id="ghBadge">GitHub RAW ✓</span>
        </div>
      </div>

      <div class="field">
        <label for="overlayText">Overlay Text <span style="font-weight:400;opacity:.6">（圖片右下角）</span></label>
        <input id="overlayText" type="text" placeholder="Your text here…" autocomplete="off">
      </div>

      <div class="field">
        <label for="shareMsg">Share Message</label>
        <textarea id="shareMsg" rows="2">這不是真的文案</textarea>
      </div>
    </div>

    <div class="preview-wrap">
      <div class="preview-empty" id="previewEmpty">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        Preview will appear here
      </div>
      <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="status" id="status" role="alert"></div>

    <div class="btn-row">
      <button class="btn-share" id="shareBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
        <span id="shareBtnLabel">Share</span>
      </button>

      <button class="btn-wa" id="waBtn" disabled style="display:none;">
        <svg width="17" height="17" viewBox="0 0 32 32" fill="currentColor">
          <path d="M16 3C8.82 3 3 8.82 3 16c0 2.3.6 4.5 1.74 6.44L3 29l6.72-1.72A12.93 12.93 0 0 0 16 29c7.18 0 13-5.82 13-13S23.18 3 16 3zm0 23.6a10.57 10.57 0 0 1-5.38-1.47l-.38-.23-3.98 1.02 1.05-3.87-.25-.4A10.58 10.58 0 1 1 16 26.6zm5.8-7.94c-.32-.16-1.88-.93-2.17-1.03-.29-.1-.5-.16-.71.16-.21.32-.81 1.03-1 1.24-.18.21-.37.24-.69.08-.32-.16-1.34-.49-2.56-1.57-.95-.84-1.58-1.88-1.77-2.2-.18-.32-.02-.49.14-.65.14-.14.32-.37.48-.56.16-.19.21-.32.32-.53.11-.21.05-.4-.03-.56-.08-.16-.71-1.71-.97-2.34-.26-.62-.52-.53-.71-.54l-.6-.01c-.21 0-.55.08-.84.4-.29.32-1.1 1.07-1.1 2.61 0 1.54 1.13 3.03 1.28 3.24.16.21 2.21 3.38 5.36 4.74.75.32 1.33.51 1.79.66.75.24 1.43.2 1.97.12.6-.09 1.88-.77 2.14-1.51.27-.74.27-1.38.19-1.51-.08-.13-.29-.21-.61-.37z"/>
        </svg>
        WhatsApp
      </button>
    </div>
  </div>

  <script>
    (function () {
      const isMobile =
        /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
        (navigator.maxTouchPoints > 1 && window.matchMedia('(pointer: coarse)').matches);

      const root = document.documentElement;
      const toggleBtn = document.querySelector('[data-theme-toggle]');
      let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      root.setAttribute('data-theme', theme);
      updateToggleIcon();

      toggleBtn.addEventListener('click', () => {
        theme = theme === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', theme);
        updateToggleIcon();
      });

      function updateToggleIcon() {
        toggleBtn.setAttribute('aria-label', 'Switch to ' + (theme === 'dark' ? 'light' : 'dark') + ' mode');
        toggleBtn.innerHTML = theme === 'dark'
          ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
          : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      }

      const imgUrlInput = document.getElementById('imgUrl');
      const textInput = document.getElementById('overlayText');
      const shareMsgEl = document.getElementById('shareMsg');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const shareBtn = document.getElementById('shareBtn');
      const shareBtnLabel = document.getElementById('shareBtnLabel');
      const waBtn = document.getElementById('waBtn');
      const btnRow = document.querySelector('.btn-row');
      const statusEl = document.getElementById('status');
      const previewEmpty = document.getElementById('previewEmpty');
      const ghBadge = document.getElementById('ghBadge');

      if (!isMobile) {
        waBtn.style.display = 'flex';
        shareBtnLabel.textContent = 'Share / Download';
      } else {
        btnRow.classList.add('mobile-single');
        waBtn.remove();
        shareBtnLabel.textContent = 'Share';
      }

      let currentImage = null;
      let debounce = null;

      function fixUrl(url) {
        const m = url.match(/^https?:\/\/github\.com\/([^/]+\/[^/]+)\/blob\/(.+)$/);
        if (m) return 'https://raw.githubusercontent.com/' + m[1] + '/' + m[2];
        return url;
      }

      function checkGhBadge(url) {
        ghBadge.classList.toggle(
          'show',
          url.trim().length > 0 && fixUrl(url.trim()).includes('raw.githubusercontent.com')
        );
      }

      imgUrlInput.addEventListener('input', () => {
        const raw = imgUrlInput.value;
        const fixed = fixUrl(raw.trim());
        if (fixed !== raw.trim() && fixed !== raw) imgUrlInput.value = fixed;
        checkGhBadge(imgUrlInput.value);
        currentImage = null;
        schedule();
      });

      checkGhBadge(imgUrlInput.value);
      schedule();

      textInput.addEventListener('input', () => {
        if (currentImage) drawOverlay();
        else schedule();
      });

      function schedule() {
        clearTimeout(debounce);
        debounce = setTimeout(renderPreview, 380);
      }

      function showStatus(type, html) {
        statusEl.className = 'status ' + type;
        statusEl.innerHTML = html;
      }

      function clearStatus() {
        statusEl.className = 'status';
        statusEl.innerHTML = '';
      }

      function setButtonsEnabled(on) {
        shareBtn.disabled = !on;
        if (!isMobile && waBtn) waBtn.disabled = !on;
      }

      function renderPreview() {
        const url = imgUrlInput.value.trim();
        if (!url) {
          canvas.style.display = 'none';
          previewEmpty.style.display = 'flex';
          setButtonsEnabled(false);
          currentImage = null;
          clearStatus();
          return;
        }

        clearStatus();
        const img = new Image();
        img.crossOrigin = 'anonymous';

        img.onload = () => {
          currentImage = img;
          canvas.width = img.naturalWidth || img.width;
          canvas.height = img.naturalHeight || img.height;
          drawOverlay();
          canvas.style.display = 'block';
          previewEmpty.style.display = 'none';
          setButtonsEnabled(true);
        };

        img.onerror = () => {
          canvas.style.display = 'none';
          previewEmpty.style.display = 'flex';
          setButtonsEnabled(false);
          currentImage = null;
          showStatus('error', '⚠ 無法載入圖片，請確認 URL 正確及主機允許 CORS。');
        };

        img.src = url;
      }

      function drawOverlay() {
        if (!currentImage) return;

        const w = canvas.width;
        const h = canvas.height;

        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(currentImage, 0, 0, w, h);

        const text = textInput.value.trim();
        if (!text) return;

        const displayWidth = canvas.offsetWidth || 440;
        const scale = w / displayWidth;
        const fSize = Math.round(16 * scale);
        const pad = Math.round(12 * scale);
        const extraLeft = Math.round(20 * scale);
        const extraUp = Math.round(10 * scale);

        ctx.font = `${fSize}px 'Noto Sans', sans-serif`;
        ctx.textBaseline = 'bottom';
        ctx.textAlign = 'right';
        ctx.shadowColor = 'rgba(255,255,255,0.6)';
        ctx.shadowBlur = Math.round(3 * scale);
        ctx.fillStyle = '#000000';
        ctx.fillText(text, w - pad - extraLeft, h - pad - extraUp);
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
      }

      shareBtn.addEventListener('click', async () => {
        if (!currentImage) return;

        shareBtn.disabled = true;
        shareBtn.innerHTML = '…';
        clearStatus();

        try {
          const blob = await canvasToBlob(canvas);
          const file = new File([blob], 'shared-image.png', { type: 'image/png' });
          const shareData = {
            text: shareMsgEl.value.trim() || undefined,
            files: [file]
          };

          if (isMobile && navigator.share && navigator.canShare && navigator.canShare(shareData)) {
            await navigator.share(shareData);
            showStatus('success', '✓ Shared!');
          } else {
            await downloadBlob(blob);
            showStatus('success', '↓ 圖片已下載！');
          }
        } catch (err) {
          if (err.name !== 'AbortError') {
            showStatus('error', '⚠ ' + (err.message || '未知錯誤'));
          }
        } finally {
          restoreShareBtn();
        }
      });

      if (waBtn) {
        waBtn.addEventListener('click', async () => {
          if (!currentImage) return;

          waBtn.disabled = true;
          waBtn.innerHTML = '…';
          clearStatus();

          try {
            const blob = await canvasToBlob(canvas);
            await downloadBlob(blob);

            const msg = shareMsgEl.value.trim();
            let copied = false;

            if (msg && navigator.clipboard) {
              try {
                await navigator.clipboard.writeText(msg);
                copied = true;
              } catch (_) {}
            }

            const waUrl = 'https://web.whatsapp.com/send?text=' + encodeURIComponent(msg || '');
            window.open(waUrl, '_blank', 'noopener,noreferrer');

            showStatus(
              'warning',
              `<span>📥 圖片已下載${copied ? '，Share Message 已複製到剪貼板' : ''}。<br>WhatsApp Web 已開啟 — 請選擇對話，然後手動附加圖片檔案。</span>`
            );
          } catch (err) {
            showStatus('error', '⚠ ' + (err.message || '未知錯誤'));
          } finally {
            waBtn.disabled = !currentImage;
            waBtn.innerHTML = `
              <svg width="17" height="17" viewBox="0 0 32 32" fill="currentColor">
                <path d="M16 3C8.82 3 3 8.82 3 16c0 2.3.6 4.5 1.74 6.44L3 29l6.72-1.72A12.93 12.93 0 0 0 16 29c7.18 0 13-5.82 13-13S23.18 3 16 3zm0 23.6a10.57 10.57 0 0 1-5.38-1.47l-.38-.23-3.98 1.02 1.05-3.87-.25-.4A10.58 10.58 0 1 1 16 26.6zm5.8-7.94c-.32-.16-1.88-.93-2.17-1.03-.29-.1-.5-.16-.71.16-.21.32-.81 1.03-1 1.24-.18.21-.37.24-.69.08-.32-.16-1.34-.49-2.56-1.57-.95-.84-1.58-1.88-1.77-2.2-.18-.32-.02-.49.14-.65.14-.14.32-.37.48-.56.16-.19.21-.32.32-.53.11-.21.05-.4-.03-.56-.08-.16-.71-1.71-.97-2.34-.26-.62-.52-.53-.71-.54l-.6-.01c-.21 0-.55.08-.84.4-.29.32-1.1 1.07-1.1 2.61 0 1.54 1.13 3.03 1.28 3.24.16.21 2.21 3.38 5.36 4.74.75.32 1.33.51 1.79.66.75.24 1.43.2 1.97.12.6-.09 1.88-.77 2.14-1.51.27-.74.27-1.38.19-1.51-.08-.13-.29-.21-.61-.37z"/>
              </svg>
              WhatsApp
            `;
          }
        });
      }

      function canvasToBlob(cv) {
        return new Promise((res, rej) => {
          cv.toBlob(blob => blob ? res(blob) : rej(new Error('toBlob failed')), 'image/png');
        });
      }

      function downloadBlob(blob) {
        return new Promise(res => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'shared-image.png';
          a.click();
          setTimeout(() => {
            URL.revokeObjectURL(url);
            res();
          }, 1500);
        });
      }

      function restoreShareBtn() {
        shareBtn.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
          <span id="shareBtnLabel">${isMobile ? 'Share' : 'Share / Download'}</span>
        `;
        shareBtn.disabled = !currentImage;
      }
    })();
  </script>
</body>
